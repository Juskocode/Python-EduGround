version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    rebase-strategy: auto
    commit-message:
      prefix: build(deps)
    groups:
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: ci(deps)
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Lisbon
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: build(container)
    groups:
      container-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
