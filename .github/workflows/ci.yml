name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"

jobs:
  validate:
    name: Offline validation (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.23.1"
          - "24.18.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run deterministic validation
        run: npm run validate

      - name: Check the browser worker
        run: node --check python-runner-worker.mjs

      - name: Check patch hygiene
        run: git diff --check

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: postgresql://eduground_ci:ci-only-password@127.0.0.1:5432/eduground_ci
      DATABASE_SSL: "false"

    services:
      postgres:
        image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: eduground_ci
          POSTGRES_USER: eduground_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eduground_ci -d eduground_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run PostgreSQL integration test
        run: npm run validate:integration

  compose-integration:
    name: Compose secure-stack integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      COMPOSE_GATE_ID: "${{ github.run_id }}-${{ github.run_attempt }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Boot and verify the hardened Compose stack
        run: npm run validate:compose
