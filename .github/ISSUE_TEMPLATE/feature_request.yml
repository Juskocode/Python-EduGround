name: Feature request
description: Propose a learner-facing, teaching, or operational improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the learner or operator need before proposing an implementation.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should a user be able to understand or do?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance evidence
      description: List observable behavior, tests, accessibility needs, or screenshots that prove completion.
    validations:
      required: true

  - type: textarea
    id: security
    attributes:
      label: Security and privacy considerations
      description: Note any learner data, authentication, execution, dependency, or deployment impact.
      placeholder: No new data or trust boundary / Describe the impact.
    validations:
      required: true
